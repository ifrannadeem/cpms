name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Dummy values: pages are dynamic, so the build never queries the database,
      # but the Supabase clients are constructed at module scope and need a URL.
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 22+: supabase-js needs native WebSocket, absent in Node 20 (CI run #6 failure)
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (non-blocking; style issues never block a deploy)
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
